<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Coffee Bean &amp; Tea Leaf — San Francisco</title>
<meta name="description" content="Cuenta regresiva para el soft opening de The Coffee Bean &amp; Tea Leaf en San Francisco.">

<!-- Favicons -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#EBE3F4">

<!-- Social preview -->
<meta property="og:title" content="The Coffee Bean &amp; Tea Leaf — San Francisco">
<meta property="og:description" content="Cuenta regresiva para el soft opening.">
<meta property="og:type" content="website">
<meta property="og:image" content="favicon-512.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; }
  @font-face {
    font-family: 'Recoleta Alt';
    src: url('assets/fonts/recoleta-alt-bold.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Sofia Pro';
    src: url('assets/fonts/sofia-pro-medium.otf') format('opentype');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }

  .cd-stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding: 48px 24px;
    overflow-y: auto;
    text-align: center;
    font-family: 'Sofia Pro', sans-serif;
    background: radial-gradient(120% 100% at 50% 0%, #F6F2FB 0%, #EBE3F4 48%, #DCD2EC 100%);
  }
  .cd-pill {
    display: inline-flex; align-items: center; justify-content: center; line-height: 1;
    font-weight: 700; font-size: clamp(15px, 1.6vw, 20px); letter-spacing: 0.3em;
    text-transform: uppercase; color: #FFFFFF; background: #512D6D;
    padding: 15px 36px 13px; border-radius: 999px; margin-bottom: 38px; text-indent: 0.3em;
  }
  .cd-logo { width: clamp(170px, 20vw, 230px); height: auto; margin-bottom: 28px; }
  .cd-place {
    display: flex; align-items: center; gap: 10px;
    font-weight: 500; font-size: clamp(17px, 1.8vw, 22px); letter-spacing: 0.22em;
    text-transform: uppercase; color: #512D6D; margin-bottom: 10px;
  }
  .cd-place svg { flex: none; transform: translateY(-0.04em); }
  .cd-row {
    display: flex; align-items: flex-start; justify-content: center;
    gap: clamp(28px, 6vw, 72px); margin-top: 40px;
  }
  .cd-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .cd-num {
    font-family: 'Recoleta Alt', 'Fraunces', serif; font-weight: 700;
    font-size: clamp(64px, 11vw, 116px); line-height: 0.92; color: #512D6D;
  }
  .cd-label {
    font-weight: 600; font-size: clamp(13px, 1.3vw, 16px); letter-spacing: 0.24em;
    text-transform: uppercase; color: #512D6D;
  }

  @media (max-width: 480px) {
    .cd-stage { padding: 32px 16px; }
    .cd-logo { width: 220px; margin-bottom: 22px; }
    .cd-pill { font-size: 17px; padding: 15px 30px 13px; margin-bottom: 30px; }
    .cd-place { font-size: 19px; margin-top: 6px; margin-bottom: 8px; }
    .cd-row { flex-wrap: wrap; align-items: center; justify-content: center; gap: 28px 0; max-width: 360px; margin-top: 24px; }
    .cd-unit { flex: 0 0 50%; }
    .cd-num { font-size: 92px; }
    .cd-label { font-size: 16px; }
  }
  @media (max-width: 340px) {
    .cd-num { font-size: 78px; }
    .cd-logo { width: 190px; }
  }
</style>
</head>
<body>
<div class="cd-stage">
  <div class="cd-pill">Soft Opening</div>

  <img class="cd-logo" src="assets/logo.svg" alt="The Coffee Bean &amp; Tea Leaf">

  <div class="cd-place">
    <svg width="0.95em" height="0.95em" viewBox="0 0 24 24" fill="#512D6D" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"></path></svg>
    <span>San Francisco</span>
  </div>

  <div class="cd-row">
    <div class="cd-unit"><span class="cd-num" id="cd-d">00</span><span class="cd-label">Días</span></div>
    <div class="cd-unit"><span class="cd-num" id="cd-h">00</span><span class="cd-label">Horas</span></div>
    <div class="cd-unit"><span class="cd-num" id="cd-m">00</span><span class="cd-label">Minutos</span></div>
    <div class="cd-unit"><span class="cd-num" id="cd-s">00</span><span class="cd-label">Segundos</span></div>
  </div>
</div>

<script>
  (function () {
    var target = new Date('2026-06-30T08:00:00-05:00').getTime();
    var el = {
      d: document.getElementById('cd-d'),
      h: document.getElementById('cd-h'),
      m: document.getElementById('cd-m'),
      s: document.getElementById('cd-s')
    };
    function pad(n) { return String(n).padStart(2, '0'); }
    var timer;
    function tick() {
      var diff = target - Date.now();
      if (diff <= 0) {
        el.d.textContent = '00'; el.h.textContent = '00';
        el.m.textContent = '00'; el.s.textContent = '00';
        clearInterval(timer);
        return;
      }
      var sec = Math.floor(diff / 1000);
      el.d.textContent = pad(Math.floor(sec / 86400));
      el.h.textContent = pad(Math.floor((sec % 86400) / 3600));
      el.m.textContent = pad(Math.floor((sec % 3600) / 60));
      el.s.textContent = pad(sec % 60);
    }
    tick();
    timer = setInterval(tick, 1000);
  })();
</script>
</body>
</html>
