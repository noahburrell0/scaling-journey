<!DOCTYPE html>

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<!-- Social preview -->
<meta property="og:title" content="The Coffee Bean &amp; Tea Leaf — Vía Israel">

<style>
  html, body { margin: 0; padding: 0; }
  @font-face {
    font-family: 'Recoleta Alt';
    src: url('assets/fonts/recoleta-alt-bold.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Sofia Pro';
    src: url('assets/fonts/sofia-pro-light.otf') format('opentype');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }

  .cd-stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding: 48px 24px;
    overflow-y: auto;
    text-align: center;
    font-family: 'Sofia Pro', sans-serif;
    background: radial-gradient(120% 100% at 50% 0%, #F6F2FB 0%, #EBE3F4 48%, #DCD2EC 100%);
  }
  .cd-logo { width: 96px; height: 96px; margin-bottom: 34px; }
  .cd-eyebrow {
    font-weight: 600; font-size: 13px; letter-spacing: 0.42em;
    text-transform: uppercase; color: #9E8CBC; margin-bottom: 18px; padding-left: 0.42em;
  }
  .cd-title {
    font-family: 'Recoleta Alt', 'Fraunces', serif; font-weight: 700;
    font-size: clamp(34px, 6vw, 64px); line-height: 1.06; color: #512D6D;
    margin: 0; letter-spacing: -0.01em; max-width: 14ch; text-wrap: balance;
  }
  .cd-title .amp { font-size: 1.04em; padding: 0 0.04em; }
  .cd-place {
    font-weight: 500; font-size: 15px; letter-spacing: 0.32em;
    text-transform: uppercase; color: #7D649F; margin-top: 16px;
  }
  .cd-row {
    display: flex; align-items: flex-start; justify-content: center;
    gap: clamp(20px, 5vw, 56px); margin-top: 54px; font-variant-numeric: tabular-nums;
  }
  .cd-unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cd-num {
    font-weight: 300; font-size: clamp(48px, 11vw, 104px); line-height: 0.9;
    color: #512D6D; font-variant-numeric: tabular-nums;
  }
  .cd-label {
    font-weight: 600; font-size: 12px; letter-spacing: 0.26em;
    text-transform: uppercase; color: #9E8CBC;
  }
  .cd-sep {
    font-weight: 200; font-size: clamp(40px, 9vw, 84px); line-height: 1;
    color: #BFB5D9; padding-top: 0.08em;
  }
  .cd-tag {
    font-family: 'Indie Flower', cursive; font-size: clamp(28px, 4vw, 40px);
    color: #7D649F; margin-top: 48px; line-height: 1;
  }

  @media (max-width: 480px) {
    .cd-stage { padding: 28px 16px; }
    .cd-logo { width: 70px; height: 70px; margin-bottom: 20px; }
    .cd-row { flex-wrap: wrap; align-items: center; gap: 22px 0; max-width: 320px; margin-top: 36px; }
    .cd-sep { display: none; }
    .cd-unit { flex: 0 0 50%; }
    .cd-num { font-size: 58px; }
    .cd-tag { margin-top: 32px; }
  }
  @media (max-width: 340px) {
    .cd-num { font-size: 50px; }
  }
</style>
</head>
<body>
<div class="cd-stage">
  <img class="cd-logo" src="assets/logo.svg" alt="The Coffee Bean &amp; Tea Leaf">

  <div class="cd-eyebrow">Nuevo</div>

  <h1 class="cd-title">The Coffee Bean <span class="amp">&amp;</span> Tea Leaf</h1>

  <div class="cd-place">Vía Israel</div>

  <div class="cd-row">
    <div class="cd-unit"><span class="cd-num" id="cd-d">00</span><span class="cd-label">Días</span></div>
    <span class="cd-sep">:</span>
    <div class="cd-unit"><span class="cd-num" id="cd-h">00</span><span class="cd-label">Horas</span></div>
    <span class="cd-sep">:</span>
    <div class="cd-unit"><span class="cd-num" id="cd-m">00</span><span class="cd-label">Minutos</span></div>
    <span class="cd-sep">:</span>
    <div class="cd-unit"><span class="cd-num" id="cd-s">00</span><span class="cd-label">Segundos</span></div>
  </div>

  <div class="cd-tag">Soft opening</div>
</div>

<script>
  (function () {
    var target = new Date('2026-06-30T08:00:00-05:00').getTime();
    var el = {
      d: document.getElementById('cd-d'),
      h: document.getElementById('cd-h'),
      m: document.getElementById('cd-m'),
      s: document.getElementById('cd-s')
    };
    function pad(n) { return String(n).padStart(2, '0'); }
    var timer;
    function tick() {
      var diff = target - Date.now();
      if (diff <= 0) {
        el.d.textContent = '00'; el.h.textContent = '00';
        el.m.textContent = '00'; el.s.textContent = '00';
        clearInterval(timer);
        return;
      }
      var sec = Math.floor(diff / 1000);
      el.d.textContent = pad(Math.floor(sec / 86400));
      el.h.textContent = pad(Math.floor((sec % 86400) / 3600));
      el.m.textContent = pad(Math.floor((sec % 3600) / 60));
      el.s.textContent = pad(sec % 60);
    }
    tick();
    timer = setInterval(tick, 1000);
  })();
</script>
</body>
</html>
